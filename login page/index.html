<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mico Industries | Employee Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <h1>Mico Industries</h1>
        </div>

        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="C:\Users\Welcome\Desktop\Mini project\login page\login.html">Login</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h2>Smart Industrial Zone Management</h2>
        <p>Secure Employee Authentication Portal</p>
    </div>
</section>

<section class="registration-section">
    <div class="form-container fade-in">

        <h2>Employee Registration</h2>

        <form id="registrationForm" novalidate>

            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="firstName" placeholder="Enter First Name">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="lastName" placeholder="Enter Last Name">
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="dob">
            </div>

            <div class="form-group">
                <label>Branch Code</label>
                <input type="text" id="branchCode" placeholder="Enter Branch Code">
            </div>

            <div class="form-group">
                <label>Branch Address</label>
                <input type="text" id="branchAddress" placeholder="Enter Branch Address">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter Official Email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter Password">
            </div>

            <div class="form-group">
                <label>Re-enter Password</label>
                <input type="password" id="rePassword" placeholder="Re-enter Password">
            </div>

            <button type="submit" class="btn-primary">Register Now</button>

        </form>

        <div id="messageBox"></div>

    </div>
</section>

<footer>
    <p>© 2026 Mico Industries | Smart Industrial Zone System</p>
</footer>

<script src="script.js"></script>

</body>
</html>
