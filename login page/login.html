<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mico Industries | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="stylelogin.css">
</head>

<body>

<header class="navbar">
    <div class="logo">
        <h1>Mico Industries</h1>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <h2>Smart Industrial Zone Portal</h2>
        <p>Secure Branch Authentication System</p>
    </div>
</section>

<section class="form-section">
    <div class="form-container fade-in">

        <h2>Portal Login</h2>

        <!-- 🔥 ADD THIS LINE HERE -->
        <div id="app"></div>

        <form id="loginForm">

            <div class="form-group">
                <label>Branch Code</label>
                <input type="text"
                       id="loginBranch"
                       placeholder="Enter Branch Code"
                       required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password"
                       id="loginPassword"
                       placeholder="Enter Password"
                       required>
            </div>

            <button type="submit" class="btn-primary">
                Login Now
            </button>

        </form>

        <div id="loginMessage"></div>

    </div>
</section>

<footer>
    <p>© 2026 Mico Industries | Smart Industrial Zone System</p>
</footer>

<script src="scriptlogin.js"></script>

</body>
</html>
